<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Ethereal theme preview</title>
  <desc id="desc">A marketplace preview generated from the current Ethereal theme colors.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07080c"/>
      <stop offset=".38" stop-color="#161420"/>
      <stop offset=".7" stop-color="#0a0e18"/>
      <stop offset="1" stop-color="#fffaf3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".34"/>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#page)"/>
  <circle cx="1000" cy="116" r="226" fill="#ffb3d1" opacity=".14"/>
  <circle cx="1120" cy="430" r="260" fill="#00f0ff" opacity=".14"/>
  <circle cx="238" cy="536" r="220" fill="#00ffaa" opacity=".08"/>

  <g filter="url(#shadow)">
    <rect x="82" y="58" width="112" height="112" rx="32" fill="#fffaf3"/>
    <path d="M138 82l32 29-12 43-20 13-20-13-12-43z" fill="#ffffff" opacity=".9"/>
    <path d="M114 118c-23-17-45-19-64-8 19 6 31 15 37 27-12-4-24-4-36 0 22 9 38 22 48 39 7-9 14-17 25-24z" fill="#ffffff" opacity=".72"/>
    <path d="M162 118c23-17 45-19 64-8-19 6-31 15-37 27 12-4 24-4 36 0-22 9-38 22-48 39-7-9-14-17-25-24z" fill="#00f0ff" opacity=".68"/>
    <ellipse cx="138" cy="77" rx="31" ry="9" fill="none" stroke="#ffe5ad" stroke-width="7"/>
    <path d="M116 118h44M112 139h52M124 160h28" fill="none" stroke="#07080c" stroke-width="7" stroke-linecap="round" opacity=".72"/>
    <path d="M116 118h44M112 139h52M124 160h28" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity=".92"/>
  </g>

  <text x="230" y="100" fill="#f8fbff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">Ethereal</text>
  <text x="232" y="146" fill="#cdd7e5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25">Celestial, retro, aero, and luminous themes for Visual Studio Code.</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    
    <g transform="translate(90 230)">
      <rect width="336" height="128" rx="18" fill="#07080c" stroke="#1a1f29" stroke-width="1.4" opacity=".97"/>
      <text x="26" y="42" fill="#eae6f5" font-size="24" font-weight="750">Default</text>
      <text x="26" y="76" fill="#a3b0c2" font-size="17">blue-black + pale sky</text>
      <circle cx="242" cy="43" r="13" fill="#9cd2ff"/>
      <circle cx="276" cy="43" r="13" fill="#7ec2ff"/>
      <circle cx="310" cy="43" r="13" fill="#dec9ff"/>
    </g>

    <g transform="translate(472 230)">
      <rect width="336" height="128" rx="18" fill="#161420" stroke="#231e31" stroke-width="1.4" opacity=".97"/>
      <text x="26" y="42" fill="#eae6f5" font-size="24" font-weight="750">Kerubin</text>
      <text x="26" y="76" fill="#cdc5e3" font-size="17">pink + lavender + gold</text>
      <circle cx="242" cy="43" r="13" fill="#ffb3d1"/>
      <circle cx="276" cy="43" r="13" fill="#ffa8cc"/>
      <circle cx="310" cy="43" r="13" fill="#dec9ff"/>
    </g>

    <g transform="translate(854 230)">
      <rect width="336" height="128" rx="18" fill="#08131a" stroke="#0d2c39" stroke-width="1.4" opacity=".97"/>
      <text x="26" y="42" fill="#d0e6f0" font-size="24" font-weight="750">Frutiger</text>
      <text x="26" y="76" fill="#93b0c0" font-size="17">fresh green + aqua glass</text>
      <circle cx="242" cy="43" r="13" fill="#00ffaa"/>
      <circle cx="276" cy="43" r="13" fill="#00d2ff"/>
      <circle cx="310" cy="43" r="13" fill="#00d2ff"/>
    </g>

    <g transform="translate(90 396)">
      <rect width="336" height="128" rx="18" fill="#0a0e18" stroke="#3c4f68" stroke-width="1.4" opacity=".97"/>
      <text x="26" y="42" fill="#c8d6e5" font-size="24" font-weight="750">Y2K Aero</text>
      <text x="26" y="76" fill="#93a5bc" font-size="17">aqua aero + electric cyan</text>
      <circle cx="242" cy="43" r="13" fill="#00f0ff"/>
      <circle cx="276" cy="43" r="13" fill="#00f0ff"/>
      <circle cx="310" cy="43" r="13" fill="#00d2ff"/>
    </g>

    <g transform="translate(472 396)">
      <rect width="336" height="128" rx="18" fill="#0a111a" stroke="#3f5168" stroke-width="1.4" opacity=".97"/>
      <text x="26" y="42" fill="#d1dfeb" font-size="24" font-weight="750">Windows 7</text>
      <text x="26" y="76" fill="#8fa8bc" font-size="17">blue glass + warm gold</text>
      <circle cx="242" cy="43" r="13" fill="#59b2ff"/>
      <circle cx="276" cy="43" r="13" fill="#ffd166"/>
      <circle cx="310" cy="43" r="13" fill="#59b2ff"/>
    </g>

    <g transform="translate(854 396)">
      <rect width="336" height="128" rx="18" fill="#fffaf3" stroke="#e8dae8" stroke-width="1.4" opacity=".97"/>
      <text x="26" y="42" fill="#3f344a" font-size="24" font-weight="750">Angelical Light</text>
      <text x="26" y="76" fill="#5f536d" font-size="17">ivory + rose + soft blue</text>
      <circle cx="242" cy="43" r="13" fill="#9f4a70"/>
      <circle cx="276" cy="43" r="13" fill="#b13d6e"/>
      <circle cx="310" cy="43" r="13" fill="#7d5fb2"/>
    </g>
